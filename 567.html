<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD | AESTHETIC MASTERS FORUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;600&family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --oatmeal: #F2EFE9;
            --ink: #1A1A1A;
            --hairline: rgba(26, 26, 26, 0.2);
        }

        body {
            background-color: var(--oatmeal);
            color: var(--ink);
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .serif-huge {
            font-family: 'Playfair Display', 'Noto Serif TC', serif;
            letter-spacing: -0.02em;
        }

        .sans-small {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .hairline-border {
            border-color: var(--hairline);
        }

        .data-card {
            border: 1px solid var(--hairline);
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .data-card:hover {
            border-color: var(--ink);
        }

        /* 旋轉動畫 */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(26,26,26,0.1);
            border-top-color: var(--ink);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-7xl mx-auto mb-16 relative">
        <div class="flex flex-col md:flex-row justify-between items-end border-b hairline-border pb-8">
            <div class="w-full md:w-2/3">
                <p class="sans-small mb-4 text-gray-500">Live Analytics Data</p>
                <h1 class="serif-huge text-5xl md:text-7xl">
                    Registration<br>
                    <span class="italic font-light">Insights</span>
                </h1>
            </div>
            <div class="w-full md:w-1/3 text-right">
                <button onclick="fetchData()" id="refreshBtn" class="sans-small border border-black px-4 py-2 hover:bg-black hover:text-white transition-all">
                    Refresh Feed
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <!-- 數據統計橫條 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
            <div class="data-card">
                <span class="sans-small">Total Attendee</span>
                <div class="serif-huge text-6xl mt-4" id="totalCount">0</div>
            </div>
            <div class="data-card">
                <span class="sans-small">Morning Session</span>
                <div class="serif-huge text-6xl mt-4" id="morningCount">0</div>
            </div>
            <div class="data-card">
                <span class="sans-small">Afternoon Session</span>
                <div class="serif-huge text-6xl mt-4" id="afternoonCount">0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <!-- 左側：職業分佈 -->
            <div class="lg:col-span-5">
                <h2 class="serif-huge text-3xl mb-8 italic">Vocation Dist.</h2>
                <div id="occDistribution" class="space-y-6">
                    <!-- JS 動態注入 -->
                </div>
            </div>

            <!-- 右側：最近報名 -->
            <div class="lg:col-span-7">
                <h2 class="serif-huge text-3xl mb-8 italic">Recent Activity</h2>
                <div class="border hairline-border">
                    <table class="w-full text-left">
                        <thead class="bg-black text-[#F2EFE9] sans-small">
                            <tr>
                                <th class="p-4">Name</th>
                                <th class="p-4">Vocation</th>
                                <th class="p-4 text-right">Time</th>
                            </tr>
                        </thead>
                        <tbody id="recentList" class="divide-y hairline-border">
                            <!-- JS 動態注入 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="max-w-7xl mx-auto mt-24 pt-8 border-t hairline-border flex justify-between items-center opacity-40 text-[10px] tracking-[0.2em] uppercase">
        <div>System Status: <span id="statusText">Standby</span></div>
        <div>Last Update: <span id="lastUpdate">-</span></div>
    </footer>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz2eEGu9AmSeK_qIgt95BIlqpEs9JXDlpKPqI2GiUKpTxFmsrKciuZ1_9Snu2htbSj6/exec';

        async function fetchData() {
            const btn = document.getElementById('refreshBtn');
            const status = document.getElementById('statusText');
            btn.innerHTML = '<span class="loading-spinner"></span> Updating';
            status.textContent = 'Fetching Data...';

            try {
                const response = await fetch(SCRIPT_URL);
                const result = await response.json();

                if (result.result === 'success') {
                    updateUI(result.data);
                    status.textContent = 'Synchronized';
                    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                console.error('Fetch Error:', error);
                status.textContent = 'Error Occurred';
            } finally {
                btn.textContent = 'Refresh Feed';
            }
        }

        function updateUI(data) {
            // 更新總數
            document.getElementById('totalCount').textContent = data.total;
            document.getElementById('morningCount').textContent = data.sessions["上午場"];
            document.getElementById('afternoonCount').textContent = data.sessions["下午場"];

            // 更新職業分佈
            const occBox = document.getElementById('occDistribution');
            occBox.innerHTML = '';
            
            Object.entries(data.occupations).forEach(([label, count]) => {
                const percentage = ((count / data.total) * 100).toFixed(0);
                occBox.innerHTML += `
                    <div>
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-sm uppercase tracking-widest">${label}</span>
                            <span class="sans-small opacity-50">${count} PERSONS / ${percentage}%</span>
                        </div>
                        <div class="w-full h-[1px] bg-gray-200 relative">
                            <div class="absolute h-[2px] bg-black transition-all duration-1000" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
            });

            // 更新最近活動
            const list = document.getElementById('recentList');
            list.innerHTML = '';
            data.recent.forEach(item => {
                const date = new Date(item.timestamp);
                const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
                list.innerHTML += `
                    <tr class="text-sm">
                        <td class="p-4 font-semibold">${item.name}</td>
                        <td class="p-4 italic opacity-70">${item.occupation}</td>
                        <td class="p-4 text-right opacity-50 font-mono">${timeStr}</td>
                    </tr>
                `;
            });
        }

        // 初始載入
        window.onload = fetchData;
        // 每分鐘自動刷新
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
